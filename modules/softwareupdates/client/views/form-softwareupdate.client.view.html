<section id="page-title">
    <div class="row">
        <div class="col-sm-8">
            <h1 class="mainTitle">Software Updates</h1>
            <span class="mainDescription">
                Version Management
                </small></span>
        </div>

    </div>
</section>

<div class="container-fluid container-fullw bg-white">
    <div class="row">
        <div class="col-md-5 col-sm-12 col-xs-12">
            <div class="panel panel-white">
                <div class="panel-heading border-light">
                    <h4 class="panel-title">Add New</h4>
                </div>
                <div class="panel-body">
                    <p class="text-small margin-bottom-20">
                        Description
                    </p>
                    <form class="form-horizontal">
                        <div class="form-group">
                            <label for="name" class="control-label col-sm-2">
                                Name
                            </label>
                            <div class="col-sm-10">
                                <input ng-model="vm.form.name" id="name" class="form-control" type="text"
                                       name="name">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="version" class="control-label col-sm-2">
                                Version
                            </label>
                            <div class="col-sm-10">
                                <input ng-model="vm.form.version" id="version" class="form-control" type="text"
                                       name="version">
                            </div>

                        </div>

                        <div ng-show="!vm.fileSelected" class="text-right form-group">
                            <button class="btn btn-default btn-file"
                                    ngf-select="(vm.fileSelected = true) && (vm.loading = false)" ng-model="patientFile"
                                    ngf-before-model-change="vm.loading = true">Select File
                            </button>
                        </div>

                        <div ng-show="vm.fileSelected" class="progress text-center">
                            <div class="progress-bar" role="progressbar" aria-valuenow="{{vm.progress}}"
                                 aria-valuemin="0" aria-valuemax="100" style="width:{{vm.progress}}%"
                                 ng-bind="vm.progress + '%'">
                                <span class="sr-only">{{vm.progress}}% Complete</span>
                            </div>
                        </div>

                        <div class="form-group" ng-show="vm.fileSelected">
                          <input id='fileid' type='file' name='filename' value="F:\Payatek\PT-SCANSUIT\update version\1.3.1.2.zip"/>
                          <p>Selected file: {{filename}}</p>
                          <!--<button type="submit" class="btn btn-green" ng-click="filename = patientFile">ثبت فایل-->
                            <button type="submit" class="btn btn-green" ng-click="vm.upload(patientFile)"> Upload
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
