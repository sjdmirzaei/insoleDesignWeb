<section>
  <div class="page-header">
    <h1>{{vm.creditplan._id ? 'Edit Creditplan' : 'New Creditplan'}}</h1>
  </div>
  <div class="col-md-12">
    <form name="vm.form.creditplanForm" class="form-horizontal" ng-submit="vm.save(vm.form.creditplanForm.$valid)" novalidate>
      <fieldset>
        <div class="form-group" show-errors>
          <label class="control-label" for="name">Name</label>
          <input name="name" type="text" ng-model="vm.creditplan.name" id="name" class="form-control" placeholder="Name" required>
          <div ng-messages="vm.form.creditplanForm.name.$error" role="alert">
            <p class="help-block error-text" ng-message="required">Creditplan name is required.</p>
          </div>
        </div>
        <div class="form-group" show-errors>
          <label class="control-label" for="expire">expire</label>
          <input name="expire" type="number" ng-model="vm.creditplan.expire" id="expire" class="form-control" placeholder="expire" required>
          <div ng-messages="vm.form.creditplanForm.expire.$error" role="alert">
            <p class="help-block error-text" ng-message="required">Creditplan expire is required.</p>
          </div>
        </div>
        <div class="form-group" show-errors>
          <label class="control-label" for="host">host</label>
          <input name="host" type="number" ng-model="vm.creditplan.host" id="host" class="form-control" placeholder="host" required>
          <div ng-messages="vm.form.creditplanForm.host.$error" role="alert">
            <p class="help-block error-text" ng-message="required">Creditplan host is required.</p>
          </div>
        </div>
        <div class="form-group" show-errors>
          <label class="control-label" for="totalorder">totalorder</label>
          <input name="totalorder" type="number" ng-model="vm.creditplan.totalorder" id="totalorder" class="form-control" placeholder="totalorder" required>
          <div ng-messages="vm.form.creditplanForm.totalorder.$error" role="alert">
            <p class="help-block error-text" ng-message="required">Creditplan host is required.</p>
          </div>
        </div>
        <div class="form-group" show-errors>
          <label class="control-label" for="price">price</label>
          <input name="price" type="number" ng-model="vm.creditplan.price" id="price" class="form-control" placeholder="price" required>
          <div ng-messages="vm.form.creditplanForm.price.$error" role="alert">
            <p class="help-block error-text" ng-message="required">Creditplan price is required.</p>
          </div>
        </div>
        <div class="form-group" show-errors>
          <label class="control-label" for="price">discount</label>
          <input name="discount" type="number" ng-model="vm.creditplan.discount" id="discount" class="form-control" placeholder="discount" required>
          <div ng-messages="vm.form.creditplanForm.price.$error" role="alert">
            <p class="help-block error-text" ng-message="required">Creditplan discount is required.</p>
          </div>
        </div>

        <div class="form-group" >
          <div class=" inline-block">

            <div class="checkbox clip-check check-info checkbox-inline">
              <input class="" type="checkbox" name="featured" ng-model="vm.creditplan.featured" id="featured" />
              <label for="featured">
                پلن پیشنهادی
              </label>
            </div>
            <!--<h4 class="list-group-item-heading pull-right">-->
            <!--{{priceplan.name}}-->
            <!--</h4>-->

          </div>
        </div>
        <div class="form-group">
          <button type="submit" class="btn btn-default">{{vm.creditplan._id ? 'Update' : 'Create'}}</button>
        </div>
        <div ng-show="vm.error" class="text-danger">
          <strong ng-bind="vm.error"></strong>
        </div>
      </fieldset>
    </form>
  </div>
</section>
