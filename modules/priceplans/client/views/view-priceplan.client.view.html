<section>
  <div class="page-header">
    <h1 ng-bind="vm.priceplan.name"></h1>
  </div>
  <div class="pull-right"
       ng-show="vm.priceplan.isCurrentUserOwner">
    <a class="btn btn-primary"
       ui-sref="priceplans.edit({ priceplanId: vm.priceplan._id })">
      <i class="glyphicon glyphicon-edit"></i>
    </a>
    <a class="btn btn-primary" ng-click="vm.remove()">
      <i class="glyphicon glyphicon-trash"></i>
    </a>
  </div>
  <small>
    <em class="text-muted">
      Posted on
      <span ng-bind="vm.priceplan.created | jDate"></span>
      by
      <span ng-if="vm.priceplan.user"
            ng-bind="vm.priceplan.user.displayName"></span>
      <span ng-if="!vm.priceplan.user">Deleted User</span>
    </em>
  </small>
  <p class="lead" ng-bind="vm.priceplan.content"></p>
</section>
